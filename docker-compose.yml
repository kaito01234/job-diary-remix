services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    container_name: job-diary-app
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/job_diary
    depends_on:
      - db

  db:
    image: postgres:15
    ports:
      - '5432:5432'
    container_name: job-diary-postgres
    environment:
      POSTGRES_DB: job_diary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
